server {
    listen ${UI_PORT:-3000};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://geoassets-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://geoassets-backend:8000;
    }

    location /docs {
        proxy_pass http://geoassets-backend:8000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
